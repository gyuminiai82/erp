name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Frontend
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.prod
        push: true
        tags: ghcr.io/gyuminiai82/erp-frontend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push Backend
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile.prod
        push: true
        tags: ghcr.io/gyuminiai82/erp-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        command_timeout: 30m
        script: |
          cd /home/${{ secrets.EC2_USER }}/port_erp
          
          # 강제로 원격 최신 코드로 덮어쓰기
          git fetch --all
          git reset --hard origin/main
          
          # DB 암호와 도메인을 환경변수로 넘기기 위해 .env 파일 생성
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" > .env
          echo "DOMAIN_NAME=erp.minstudio.app" >> .env
          
          # SSL 인증서가 없는 경우 자동 발급
          if [ ! -d "./certbot/conf/live/erp.minstudio.app" ]; then
            echo "SSL certificate not found. Running init-letsencrypt.sh..."
            chmod +x ./init-letsencrypt.sh
            sudo ./init-letsencrypt.sh
          fi
          
          # GHCR 로그인 (Public 레포면 생략 가능하지만 만약을 위해)
          # public 리포지토리의 경우 로그인이 필요 없으므로 생략합니다.
          
          # 최신 이미지 풀 및 재시작
          docker-compose -f docker-compose.prod.yml pull
          docker-compose -f docker-compose.prod.yml up -d
          
          # 데이터베이스 마이그레이션 적용 (변경된 테이블/필드 자동 반영)
          docker-compose -f docker-compose.prod.yml exec -T backend alembic upgrade head
          
          # 최초 시스템 관리자 계정 생성 (이미 존재하면 무시됨)
          docker-compose -f docker-compose.prod.yml exec -T backend python create_admin.py

          # 로컬 DB 덤프 복원 (존재할 경우)
          if [ -f "db_dump.sql" ]; then
            echo "Restoring database from db_dump.sql..."
            cat db_dump.sql | docker-compose -f docker-compose.prod.yml exec -T db psql -U postgres -d erp
            echo "Database restore completed."
          fi
          
          # Nginx가 재생성된 컨테이너의 새 IP를 바라보도록 리로드/재시작
          docker-compose -f docker-compose.prod.yml restart nginx
          
          # 오래된 도커 이미지 정리
          docker image prune -af
