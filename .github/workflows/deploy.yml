name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Frontend
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.prod
        push: true
        tags: ghcr.io/gyuminiai82/erp-frontend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push Backend
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile.prod
        push: true
        tags: ghcr.io/gyuminiai82/erp-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        command_timeout: 30m
        script: |
          cd /home/${{ secrets.EC2_USER }}/port_erp
          
          # 강제로 원격 최신 코드로 덮어쓰기
          git fetch --all
          git reset --hard origin/main
          
          # DB 암호를 환경변수로 넘기기 위해 .env 파일 생성
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" > .env
          
          # GHCR 로그인 (Public 레포면 생략 가능하지만 만약을 위해)
          # public 리포지토리의 경우 로그인이 필요 없으므로 생략합니다.
          
          # 최신 이미지 풀 및 재시작
          docker-compose -f docker-compose.prod.yml pull
          docker-compose -f docker-compose.prod.yml up -d
          
          # Nginx가 재생성된 컨테이너의 새 IP를 바라보도록 리로드/재시작
          docker-compose -f docker-compose.prod.yml restart nginx
          
          # 오래된 도커 이미지 정리
          docker image prune -af
